server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # React Router — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
